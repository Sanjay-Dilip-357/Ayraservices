<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - AYRA Services</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .success-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            margin: 0 auto;
        }
        .success-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            color: white;
            font-size: 4rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .success-title {
            font-weight: 700;
            color: #333;
            font-size: 2rem;
            margin-bottom: 1.5rem;
        }
        .info-table {
            text-align: left;
            margin: 2rem 0;
        }
        .info-table td {
            padding: 0.75rem 1rem;
        }
        .info-table td:first-child {
            font-weight: 600;
            color: #6c757d;
        }
        .info-table td:last-child {
            color: #333;
        }
        .btn-continue {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: none;
            border-radius: 10px;
            padding: 1rem 2.5rem;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .btn-continue:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(17, 153, 142, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-card">
            <div class="success-icon">
                <i class="bi bi-check-lg"></i>
            </div>
            <h2 class="success-title">{{ title }}</h2>
            
            <table class="table info-table">
                <tr>
                    <td><i class="bi bi-person me-2"></i>Name</td>
                    <td>{{ name }}</td>
                </tr>
                <tr>
                    <td><i class="bi bi-envelope me-2"></i>Email</td>
                    <td>{{ email }}</td>
                </tr>
                <tr>
                    <td><i class="bi bi-shield me-2"></i>Role</td>
                    <td>
                        <span class="badge bg-success">{{ role }}</span>
                    </td>
                </tr>
            </table>
            
            <p class="text-muted mb-4">
                <i class="bi bi-info-circle me-1"></i>
                You can now login with your credentials
            </p>
            
            <a href="{{ redirect_url }}" class="btn btn-continue btn-success btn-lg">
                <i class="bi bi-box-arrow-in-right me-2"></i>Go to Login
            </a>
        </div>
    </div>
</body>
</html>
